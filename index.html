<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>蛋仔派对 - 朱宸旭大冒险</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
canvas { display: block; }
#touchControls {
  display: none; position: fixed; bottom: 0; left: 0; right: 0; height: 180px;
  pointer-events: none; z-index: 10;
}
.touch-btn {
  position: absolute; border-radius: 50%; pointer-events: auto;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; color: rgba(255,255,255,0.9); user-select: none;
  -webkit-user-select: none; font-weight: bold;
}
#btnLeft { width: 60px; height: 60px; bottom: 24px; left: 16px; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); }
#btnRight { width: 60px; height: 60px; bottom: 24px; left: 90px; background: rgba(255,255,255,0.2); border: 3px solid rgba(255,255,255,0.4); }
#btnJump { width: 68px; height: 68px; bottom: 80px; right: 90px; background: rgba(76,175,80,0.4); border: 3px solid rgba(76,175,80,0.6); }
#btnShoot { width: 68px; height: 68px; bottom: 24px; right: 16px; background: rgba(255,152,0,0.4); border: 3px solid rgba(255,152,0,0.6); }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="touchControls">
  <div class="touch-btn" id="btnLeft">◀</div>
  <div class="touch-btn" id="btnRight">▶</div>
  <div class="touch-btn" id="btnJump">跳</div>
  <div class="touch-btn" id="btnShoot">🔫</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
if (isMobile) document.getElementById('touchControls').style.display = 'block';

// === 常量 ===
const G = 0.55, FRIC = 0.82, JUMP = -12.5, SPD = 4.8, LEVEL_W = 8000, BULLET_SPD = 9, SHOOT_CD = 18;

// === 输入 ===
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; keys[e.code] = true; });
window.addEventListener('keyup', e => { keys[e.key] = false; keys[e.code] = false; });

const tch = { left:false, right:false, jump:false, shoot:false };
function addTB(id, k) {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', e => { e.preventDefault(); tch[k] = true; });
  el.addEventListener('touchend', e => { e.preventDefault(); tch[k] = false; });
  el.addEventListener('touchcancel', e => { e.preventDefault(); tch[k] = false; });
}
addTB('btnLeft','left'); addTB('btnRight','right'); addTB('btnJump','jump'); addTB('btnShoot','shoot');

const isL = () => keys['a']||keys['A']||keys['ArrowLeft']||tch.left;
const isR = () => keys['d']||keys['D']||keys['ArrowRight']||tch.right;
const isJ = () => keys['w']||keys['W']||keys['ArrowUp']||tch.jump;
const isSh = () => keys[' ']||tch.shoot;

// === 状态 ===
let state='menu', score=0, lives=3, cam={x:0}, jpd=false, spd=false, inv=0, spdT=0, dTimer=0;
let particles=[], clouds=[], bullets=[], shootCD=0, menuB=0, shakeT=0;

for(let i=0;i<30;i++) clouds.push({x:Math.random()*LEVEL_W, y:Math.random()*250+20, w:Math.random()*100+60, sp:Math.random()*0.3+0.1, op:Math.random()*0.4+0.3});

// === 关卡 ===
let plats=[], coins=[], enemies=[], spikes=[], pups=[], mplats=[], flagX=LEVEL_W-200;
function gY(){return canvas.height-100;}

function buildLevel(){
  plats=[]; coins=[]; enemies=[]; spikes=[]; pups=[]; mplats=[]; bullets=[];
  const gy=gY();
  // 地面
  [[0,800],[900,1800],[1900,2600],[2700,3200],[3400,4200],[4300,5000],[5100,5600],[5700,6400],[6500,7200],[7300,LEVEL_W]].forEach(([s,e])=>plats.push({x:s,y:gy,w:e-s,h:40,gnd:true}));
  // 浮空
  [[300,gy-100,120],[500,gy-180,100],[750,gy-250,80],[1000,gy-120,150],[1200,gy-200,100],[1500,gy-150,120],[1700,gy-250,100],[1950,gy-100,80],[2100,gy-200,120],[2400,gy-280,100],[2650,gy-120,80],[2900,gy-200,120],[3100,gy-300,100],[3500,gy-150,120],[3700,gy-250,100],[3900,gy-180,80],[4100,gy-100,120],[4400,gy-220,150],[4700,gy-300,80],[4950,gy-150,100],[5200,gy-200,120],[5400,gy-280,80],[5650,gy-120,100],[5900,gy-250,120],[6200,gy-180,100],[6400,gy-100,80],[6700,gy-220,120],[6900,gy-300,100],[7100,gy-150,80],[7400,gy-200,120],[7600,gy-100,150]].forEach(([x,y,w])=>plats.push({x,y,w,h:20}));
  // 移动平台
  mplats=[{x:1350,y:gy-180,w:100,h:20,sx:1350,ex:1550,sp:1,d:1},{x:2800,y:gy-160,w:100,h:20,sx:2700,ex:2950,sp:1.2,d:1},{x:4500,y:gy-180,w:100,h:20,sx:4400,ex:4650,sp:0.8,d:1},{x:6000,y:gy-200,w:120,h:20,sx:5900,ex:6200,sp:1,d:1}];
  // 金币
  [[200,gy-40],[250,gy-40],[300,gy-40],[500,gy-220],[550,gy-220],[1000,gy-160],[1050,gy-160],[1100,gy-160],[1500,gy-190],[1550,gy-190],[1700,gy-290],[1750,gy-290],[2100,gy-240],[2150,gy-240],[2400,gy-320],[2450,gy-320],[2900,gy-240],[2950,gy-240],[3000,gy-240],[3500,gy-190],[3550,gy-190],[3700,gy-290],[4100,gy-140],[4150,gy-140],[4400,gy-260],[4450,gy-260],[4500,gy-260],[4950,gy-190],[5000,gy-190],[5200,gy-240],[5650,gy-160],[5900,gy-290],[5950,gy-290],[6200,gy-220],[6700,gy-260],[7100,gy-190],[7400,gy-240],[7450,gy-240],[7500,gy-240]].forEach(([x,y])=>coins.push({x,y,w:20,h:20,got:false,bob:Math.random()*Math.PI*2}));
  // 尖刺
  [850,1850,2650,3250,4250,5050,5650,6450,7250].forEach(x=>spikes.push({x,y:gy-20,w:40,h:20}));
  // 敌人
  [[600,gy-48,400,800],[1100,gy-48,1000,1300],[1600,gy-48,1500,1800],[2200,gy-48,2000,2500],[3000,gy-48,2800,3200],[3600,gy-48,3500,3800],[4200,gy-48,4100,4400],[4800,gy-48,4600,5000],[5300,gy-48,5200,5500],[5800,gy-48,5700,6000],[6300,gy-48,6200,6500],[6800,gy-48,6600,7000],[7200,gy-48,7100,7400]].forEach(([x,y,mn,mx])=>enemies.push({x,y,w:42,h:48,mn,mx,sp:1.3+Math.random()*0.8,d:1,alive:true,sq:0,hit:0,hp:2,blink:Math.random()*120|0}));
  // 道具
  pups=[{x:750,y:gy-290,t:'speed',got:false},{x:2400,y:gy-320,t:'star',got:false},{x:3900,y:gy-220,t:'speed',got:false},{x:5400,y:gy-320,t:'star',got:false},{x:6900,y:gy-340,t:'speed',got:false}];
}

// === 玩家 ===
let P={x:100,y:0,w:36,h:44,vx:0,vy:0,og:false,fr:true,sqX:1,sqY:1,blink:0};

function resetP(){P.x=100;P.y=gY()-80;P.vx=0;P.vy=0;P.og=false;P.sqX=1;P.sqY=1;inv=0;spdT=0;shootCD=0;}
function startGame(){state='playing';score=0;lives=3;cam.x=0;particles=[];bullets=[];buildLevel();resetP();}

// === 粒子 ===
function spawn(x,y,col,n){for(let i=0;i<n;i++)particles.push({x,y,vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8-3,l:30+Math.random()*20,c:col,s:3+Math.random()*4});}
function rc(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}

// === 绘制蛋仔 ===
function drawEgg(x,y,w,h,isEnemy,name,fr,sqX,sqY,blk,hurt){
  ctx.save();
  const cx=x+w/2, cy=y+h/2;
  ctx.translate(cx,cy);
  ctx.scale(sqX,sqY);

  // 阴影
  ctx.beginPath();
  ctx.ellipse(0,h/2+2,w*0.4,4,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.fill();

  // 身体（蛋形：上窄下宽）
  ctx.beginPath();
  ctx.moveTo(0,-h/2);
  ctx.bezierCurveTo(w*0.55,-h/2, w*0.6,h*0.1, w*0.55,h*0.25);
  ctx.bezierCurveTo(w*0.5,h/2, -w*0.5,h/2, -w*0.55,h*0.25);
  ctx.bezierCurveTo(-w*0.6,h*0.1, -w*0.55,-h/2, 0,-h/2);
  ctx.closePath();

  if(isEnemy){
    const eg=ctx.createRadialGradient(0,-h*0.1,0,0,0,h*0.55);
    eg.addColorStop(0,'#EF5350');eg.addColorStop(0.7,'#C62828');eg.addColorStop(1,'#8E0000');
    ctx.fillStyle=eg;
  } else {
    const pg=ctx.createRadialGradient(-w*0.1,-h*0.15,0,0,0,h*0.55);
    pg.addColorStop(0,'#E3F2FD');pg.addColorStop(0.5,'#90CAF9');pg.addColorStop(1,'#42A5F5');
    ctx.fillStyle=pg;
  }
  if(hurt>0) ctx.fillStyle='#fff';
  ctx.fill();
  ctx.strokeStyle=isEnemy?'#8E0000':'#1565C0';
  ctx.lineWidth=2;
  ctx.stroke();

  // 蛋壳碎片（头顶）
  ctx.save();
  ctx.translate(0,-h/2-2);
  if(isEnemy){
    // 黑色尖角蛋壳
    ctx.fillStyle='#37474F';
    ctx.beginPath();
    ctx.moveTo(-w*0.35,4);
    ctx.lineTo(-w*0.25,-8);
    ctx.lineTo(-w*0.1,2);
    ctx.lineTo(0,-12);
    ctx.lineTo(w*0.1,2);
    ctx.lineTo(w*0.25,-6);
    ctx.lineTo(w*0.35,4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#263238';
    ctx.lineWidth=1.5;
    ctx.stroke();
    // 小角
    ctx.fillStyle='#D32F2F';
    ctx.beginPath();
    ctx.moveTo(-w*0.15,-8);ctx.lineTo(-w*0.1,-18);ctx.lineTo(-w*0.02,-8);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(w*0.05,-10);ctx.lineTo(w*0.12,-20);ctx.lineTo(w*0.18,-10);ctx.fill();
  } else {
    // 蓝色可爱蛋壳
    ctx.fillStyle='#BBDEFB';
    ctx.beginPath();
    ctx.moveTo(-w*0.35,4);
    ctx.lineTo(-w*0.2,-6);
    ctx.lineTo(-w*0.05,2);
    ctx.lineTo(w*0.05,-8);
    ctx.lineTo(w*0.2,0);
    ctx.lineTo(w*0.35,4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle='#64B5F6';
    ctx.lineWidth=1.5;
    ctx.stroke();
  }
  ctx.restore();

  // 小手（左右短胖手）
  const handY=h*0.05, handR=5;
  ctx.fillStyle=isEnemy?'#EF5350':'#90CAF9';
  ctx.strokeStyle=isEnemy?'#C62828':'#1565C0';
  ctx.lineWidth=1.5;
  // 左手
  ctx.beginPath();
  ctx.ellipse(-w*0.55,handY,handR+1,handR,0,0,Math.PI*2);
  ctx.fill();ctx.stroke();
  // 右手
  ctx.beginPath();
  ctx.ellipse(w*0.55,handY,handR+1,handR,0,0,Math.PI*2);
  ctx.fill();ctx.stroke();

  // 小脚
  const footY=h*0.42, footR=5;
  ctx.fillStyle=isEnemy?'#D32F2F':'#64B5F6';
  ctx.strokeStyle=isEnemy?'#8E0000':'#1565C0';
  ctx.beginPath();
  ctx.ellipse(-w*0.2,footY,footR+2,footR,0,0,Math.PI*2);
  ctx.fill();ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(w*0.2,footY,footR+2,footR,0,0,Math.PI*2);
  ctx.fill();ctx.stroke();

  // 腮红
  ctx.beginPath();
  ctx.ellipse(-w*0.28,h*0.08,6,3.5,0,0,Math.PI*2);
  ctx.fillStyle=isEnemy?'rgba(255,50,50,0.4)':'rgba(255,150,150,0.5)';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(w*0.28,h*0.08,6,3.5,0,0,Math.PI*2);
  ctx.fill();

  // 眼睛
  const eyeY=-h*0.08, eyeS=w*0.18;
  const blinking=blk>115;

  if(blinking){
    ctx.strokeStyle='#333';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.moveTo(-eyeS-5,eyeY);ctx.lineTo(-eyeS+5,eyeY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(eyeS-5,eyeY);ctx.lineTo(eyeS+5,eyeY);ctx.stroke();
  } else {
    // 白眼框
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.ellipse(-eyeS,eyeY,7,8.5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(eyeS,eyeY,7,8.5,0,0,Math.PI*2);ctx.fill();
    // 瞳孔
    const po=fr?2.5:-2.5;
    if(isEnemy){
      // 坏蛋斜眼
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.ellipse(-eyeS+po,eyeY+1,4,5,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(eyeS+po,eyeY+1,4,5,0,0,Math.PI*2);ctx.fill();
      // 红色反光
      ctx.fillStyle='#F44336';
      ctx.beginPath();ctx.arc(-eyeS+po+1,eyeY-1,1.5,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(eyeS+po+1,eyeY-1,1.5,0,Math.PI*2);ctx.fill();
      // 愤怒眉毛
      ctx.strokeStyle='#333';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.moveTo(-eyeS-6,eyeY-11);ctx.lineTo(-eyeS+4,eyeY-8);ctx.stroke();
      ctx.beginPath();ctx.moveTo(eyeS+6,eyeY-11);ctx.lineTo(eyeS-4,eyeY-8);ctx.stroke();
    } else {
      ctx.fillStyle='#333';
      ctx.beginPath();ctx.ellipse(-eyeS+po,eyeY,3.5,4.5,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse(eyeS+po,eyeY,3.5,4.5,0,0,Math.PI*2);ctx.fill();
      // 可爱高光
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(-eyeS+po+1.5,eyeY-2.5,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(eyeS+po+1.5,eyeY-2.5,2,0,Math.PI*2);ctx.fill();
    }
  }

  // 嘴巴
  if(isEnemy){
    // 坏笑+尖牙
    ctx.beginPath();
    ctx.moveTo(-7,h*0.18);ctx.quadraticCurveTo(0,h*0.32,7,h*0.18);
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(-4,h*0.22);ctx.lineTo(-2,h*0.28);ctx.lineTo(0,h*0.22);ctx.fill();
    ctx.beginPath();ctx.moveTo(2,h*0.22);ctx.lineTo(4,h*0.28);ctx.lineTo(6,h*0.22);ctx.fill();
  } else {
    // 开心微笑
    ctx.beginPath();
    ctx.arc(0,h*0.15,5,0.1*Math.PI,0.9*Math.PI);
    ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.stroke();
  }

  ctx.restore();

  // 名字标签
  ctx.save();
  ctx.font='bold 11px sans-serif';
  ctx.textAlign='center';
  const nx=x+w/2, ny=y-16;
  // 背景
  const tw=ctx.measureText(name).width+8;
  ctx.fillStyle=isEnemy?'rgba(198,40,40,0.7)':'rgba(21,101,192,0.7)';
  ctx.beginPath();ctx.roundRect(nx-tw/2,ny-11,tw,16,4);ctx.fill();
  ctx.fillStyle='#fff';
  ctx.fillText(name,nx,ny);
  ctx.restore();
}

// === 更新 ===
function update(){
  if(state!=='playing'){menuB+=0.05;return;}
  if(inv>0)inv--;
  if(spdT>0)spdT--;
  if(shootCD>0)shootCD--;
  if(shakeT>0)shakeT--;

  // 移动
  const sp=spdT>0?SPD*1.6:SPD;
  if(isL()){P.vx=-sp;P.fr=false;}
  else if(isR()){P.vx=sp;P.fr=true;}
  else P.vx*=FRIC;

  // 跳跃 (W / ↑)
  if(isJ()&&!jpd&&P.og){P.vy=JUMP;P.og=false;jpd=true;P.sqX=1.3;P.sqY=0.7;}
  if(!isJ())jpd=false;

  // 射击 (空格)
  if(isSh()&&shootCD<=0){
    shootCD=SHOOT_CD;
    const bx=P.fr?P.x+P.w:P.x;
    const by=P.y+P.h*0.4;
    bullets.push({x:bx,y:by,vx:P.fr?BULLET_SPD:-BULLET_SPD,w:10,h:6,life:80});
    // 后坐力
    P.vx+=P.fr?-1.5:1.5;
    spawn(bx,by,'#FFA726',4);
  }

  P.vy+=G; P.x+=P.vx; P.y+=P.vy;
  if(P.x<0)P.x=0;
  if(P.x>LEVEL_W-P.w)P.x=LEVEL_W-P.w;
  P.sqX+=(1-P.sqX)*0.15; P.sqY+=(1-P.sqY)*0.15;

  // 平台碰撞
  P.og=false;
  const ap=[...plats,...mplats];
  for(const p of ap){
    if(P.vy>=0&&P.x+P.w>p.x&&P.x<p.x+p.w&&P.y+P.h>=p.y&&P.y+P.h<=p.y+(p.h||20)+P.vy+2){
      P.y=p.y-P.h;P.vy=0;P.og=true;
    }
  }

  if(P.y>canvas.height+100){die();return;}

  // 移动平台
  for(const m of mplats){m.x+=m.sp*m.d;if(m.x<=m.sx)m.d=1;if(m.x>=m.ex)m.d=-1;}

  // 子弹
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx;b.life--;
    if(b.life<=0){bullets.splice(i,1);continue;}
    // 子弹打敌人
    let hit=false;
    for(const e of enemies){
      if(e.alive&&rc(b,e)){
        e.hp--;e.hit=10;
        if(e.hp<=0){e.alive=false;e.sq=20;score+=50;spawn(e.x+21,e.y+24,'#F44336',12);}
        else{spawn(b.x,b.y,'#FF8A65',5);}
        hit=true;break;
      }
    }
    // 子弹撞平台
    for(const p of ap){if(rc(b,{x:p.x,y:p.y,w:p.w,h:p.h||20})){hit=true;spawn(b.x,b.y,'#FFE0B2',3);break;}}
    if(hit)bullets.splice(i,1);
  }

  // 金币
  for(const c of coins){if(!c.got&&rc(P,c)){c.got=true;score+=10;spawn(c.x+10,c.y+10,'#FFD700',8);}}
  // 道具
  for(const p of pups){
    if(!p.got&&rc(P,{x:p.x-5,y:p.y-5,w:30,h:30})){
      p.got=true;
      if(p.t==='speed'){spdT=300;spawn(p.x,p.y,'#00BCD4',12);}
      else{inv=300;spawn(p.x,p.y,'#FFD700',15);}
    }
  }
  // 尖刺
  for(const s of spikes){if(rc(P,s)&&inv<=0){die();return;}}
  // 敌人
  for(const e of enemies){
    if(!e.alive){if(e.sq>0)e.sq--;continue;}
    if(e.hit>0)e.hit--;
    e.x+=e.sp*e.d;
    if(e.x<=e.mn)e.d=1;if(e.x>=e.mx)e.d=-1;
    e.blink++;if(e.blink>120)e.blink=0;
    if(rc(P,e)){
      if(inv>0){e.alive=false;e.sq=20;score+=50;spawn(e.x+21,e.y+24,'#F44336',12);}
      else if(P.vy>0&&P.y+P.h<e.y+e.h*0.5){
        e.hp--;e.hit=10;P.vy=JUMP*0.7;
        if(e.hp<=0){e.alive=false;e.sq=20;score+=50;spawn(e.x+21,e.y+24,'#F44336',12);}
      } else{die();return;}
    }
  }

  if(P.x>=flagX){state='win';spawn(P.x,P.y,'#FFD700',30);spawn(P.x,P.y,'#FF4081',20);}

  // 摄像头
  const tc=P.x-canvas.width*0.35;
  cam.x+=(tc-cam.x)*0.08;
  cam.x=Math.max(0,Math.min(cam.x,LEVEL_W-canvas.width));

  // 粒子
  for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.l--;if(p.l<=0)particles.splice(i,1);}
  P.blink++;if(P.blink>120)P.blink=0;
  for(const c of clouds){c.x+=c.sp;if(c.x>LEVEL_W+100)c.x=-c.w;}
}

function die(){
  lives--;shakeT=15;spawn(P.x+18,P.y+22,'#FF5722',15);
  if(lives<=0)state='gameover';
  else{state='dead';dTimer=60;}
}

// === 绘制 ===
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(state==='menu'){drawMenu();return;}
  if(state==='gameover'){drawGO();return;}
  if(state==='win'){drawWin();return;}

  // 屏幕震动
  let sx=0,sy=0;
  if(shakeT>0){sx=(Math.random()-.5)*shakeT;sy=(Math.random()-.5)*shakeT;}

  // 天空
  const sg=ctx.createLinearGradient(0,0,0,canvas.height);
  sg.addColorStop(0,'#87CEEB');sg.addColorStop(0.6,'#B3E5FC');sg.addColorStop(1,'#E8F5E9');
  ctx.fillStyle=sg;ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.save();
  ctx.translate(-cam.x+sx,sy);

  // 云（视差）
  for(const c of clouds){
    const px=c.x-cam.x*0.3;
    ctx.fillStyle=`rgba(255,255,255,${c.op})`;
    ctx.beginPath();ctx.ellipse(px,c.y,c.w/2,c.w/4,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px-c.w*0.25,c.y+5,c.w/3,c.w/5,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px+c.w*0.25,c.y+3,c.w/3,c.w/5,0,0,Math.PI*2);ctx.fill();
  }

  // 背景山丘
  ctx.fillStyle='#A5D6A7';
  for(let i=0;i<LEVEL_W;i+=300){
    ctx.beginPath();ctx.ellipse(i-cam.x*0.5,gY()+10,200,80,0,Math.PI,0);ctx.fill();
  }

  const gy=gY();

  // 地面
  for(const p of plats){
    if(p.gnd){
      ctx.fillStyle='#388E3C';ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#4CAF50';ctx.fillRect(p.x,p.y,p.w,8);
      ctx.fillStyle='#66BB6A';
      for(let gx=p.x;gx<p.x+p.w;gx+=12){
        ctx.beginPath();ctx.moveTo(gx,p.y);ctx.lineTo(gx+3,p.y-7);ctx.lineTo(gx+6,p.y);ctx.fill();
      }
    } else {
      // 浮空平台
      ctx.fillStyle='#8BC34A';
      ctx.beginPath();ctx.roundRect(p.x,p.y,p.w,p.h,8);ctx.fill();
      ctx.strokeStyle='#689F38';ctx.lineWidth=2;ctx.stroke();
    }
  }

  // 移动平台
  for(const m of mplats){
    ctx.fillStyle='#FF9800';
    ctx.beginPath();ctx.roundRect(m.x,m.y,m.w,m.h,6);ctx.fill();
    ctx.strokeStyle='#E65100';ctx.lineWidth=2;ctx.stroke();
  }

  // 尖刺
  for(const s of spikes){
    ctx.fillStyle='#F44336';
    for(let i=0;i<s.w;i+=10){
      ctx.beginPath();ctx.moveTo(s.x+i,s.y+s.h);ctx.lineTo(s.x+i+5,s.y);ctx.lineTo(s.x+i+10,s.y+s.h);ctx.fill();
    }
  }

  // 金币
  const t=Date.now()/400;
  for(const c of coins){
    if(c.got)continue;
    const by=Math.sin(t+c.bob)*4;
    ctx.beginPath();ctx.arc(c.x+10,c.y+10+by,10,0,Math.PI*2);
    const cg=ctx.createRadialGradient(c.x+8,c.y+7+by,2,c.x+10,c.y+10+by,10);
    cg.addColorStop(0,'#FFF176');cg.addColorStop(1,'#FFB300');
    ctx.fillStyle=cg;ctx.fill();
    ctx.strokeStyle='#FF8F00';ctx.lineWidth=2;ctx.stroke();
    ctx.fillStyle='#FFF8E1';ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.fillText('$',c.x+10,c.y+14+by);
  }

  // 道具
  for(const p of pups){
    if(p.got)continue;
    const by=Math.sin(t*1.5)*5;
    ctx.save();ctx.translate(p.x+10,p.y+10+by);
    if(p.t==='speed'){
      ctx.fillStyle='#00BCD4';ctx.beginPath();ctx.roundRect(-12,-10,24,20,6);ctx.fill();
      ctx.strokeStyle='#006064';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='center';ctx.fillText('⚡',0,5);
    } else {
      ctx.fillStyle='#FFD700';ctx.beginPath();
      for(let i=0;i<5;i++){const a=(i*4*Math.PI)/5-Math.PI/2;ctx.lineTo(Math.cos(a)*12,Math.sin(a)*12);const a2=a+(2*Math.PI)/10;ctx.lineTo(Math.cos(a2)*5,Math.sin(a2)*5);}
      ctx.closePath();ctx.fill();ctx.strokeStyle='#FF8F00';ctx.lineWidth=2;ctx.stroke();
    }
    ctx.restore();
  }

  // 终点旗
  ctx.fillStyle='#795548';ctx.fillRect(flagX+10,gy-120,6,120);
  ctx.fillStyle='#FF4081';
  ctx.beginPath();ctx.moveTo(flagX+16,gy-120);ctx.lineTo(flagX+60,gy-100);ctx.lineTo(flagX+16,gy-80);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.fillText('GOAL',flagX+38,gy-96);

  // 敌人
  for(const e of enemies){
    if(!e.alive&&e.sq<=0)continue;
    const s=e.alive?1:(e.sq/20);
    drawEgg(e.x,e.y+(1-s)*e.h*0.5,e.w,e.h*s,true,'巩昱麟',e.d>0,1,1,e.blink,e.hit);
  }

  // 子弹
  for(const b of bullets){
    ctx.save();ctx.translate(b.x+b.w/2,b.y+b.h/2);
    // 拖尾
    ctx.fillStyle='rgba(255,167,38,0.3)';
    ctx.beginPath();ctx.ellipse(b.vx>0?-8:8,0,12,4,0,0,Math.PI*2);ctx.fill();
    // 子弹
    const bg=ctx.createRadialGradient(-1,-1,1,0,0,b.w/2);
    bg.addColorStop(0,'#FFF176');bg.addColorStop(1,'#FF9800');
    ctx.fillStyle=bg;
    ctx.beginPath();ctx.ellipse(0,0,b.w/2,b.h/2,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#E65100';ctx.lineWidth=1;ctx.stroke();
    ctx.restore();
  }

  // 玩家
  if(inv<=0||Math.floor(inv/4)%2===0){
    drawEgg(P.x,P.y,P.w,P.h,false,'朱宸旭',P.fr,P.sqX,P.sqY,P.blink,0);
    // 无敌光环
    if(inv>0){
      ctx.beginPath();ctx.arc(P.x+P.w/2,P.y+P.h/2,32,0,Math.PI*2);
      ctx.strokeStyle=`rgba(255,215,0,${0.3+Math.sin(Date.now()/100)*0.3})`;ctx.lineWidth=3;ctx.stroke();
    }
    // 加速拖尾
    if(spdT>0){
      for(let i=1;i<=3;i++){
        ctx.beginPath();ctx.ellipse(P.x+P.w/2-(P.fr?i*12:-i*12),P.y+P.h/2,8-i*2,12-i*3,0,0,Math.PI*2);
        ctx.fillStyle=`rgba(0,188,212,${0.3-i*0.08})`;ctx.fill();
      }
    }
  }

  // 粒子
  for(const p of particles){
    ctx.beginPath();ctx.arc(p.x,p.y,p.s*(p.l/50),0,Math.PI*2);
    ctx.fillStyle=p.c;ctx.globalAlpha=p.l/50;ctx.fill();ctx.globalAlpha=1;
  }

  ctx.restore();
  drawHUD();

  // 死亡暂停
  if(state==='dead'){
    dTimer--;
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';
    ctx.fillText(`还剩 ${lives} 条命！`,canvas.width/2,canvas.height/2);
    if(dTimer<=0){state='playing';resetP();}
  }
}

function drawHUD(){
  // 分数
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(10,10,130,38,12);ctx.fill();
  ctx.fillStyle='#FFD700';ctx.font='bold 18px sans-serif';ctx.textAlign='left';
  ctx.fillText(`⭐ ${score}`,22,35);
  // 生命
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(150,10,30*lives+16,38,12);ctx.fill();
  for(let i=0;i<lives;i++){ctx.fillStyle='#F44336';ctx.font='18px sans-serif';ctx.fillText('❤️',162+i*28,36);}
  // 子弹CD
  const cdPct=shootCD/SHOOT_CD;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.beginPath();ctx.roundRect(10,56,60,8,4);ctx.fill();
  ctx.fillStyle=cdPct>0?'#FF9800':'#4CAF50';
  ctx.beginPath();ctx.roundRect(10,56,60*(1-cdPct),8,4);ctx.fill();
  // 道具状态
  let ox=270;
  if(spdT>0){ctx.fillStyle='rgba(0,188,212,0.6)';ctx.beginPath();ctx.roundRect(ox,10,80,38,12);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='left';ctx.fillText(`⚡${Math.ceil(spdT/60)}s`,ox+10,34);ox+=90;}
  if(inv>0){ctx.fillStyle='rgba(255,215,0,0.6)';ctx.beginPath();ctx.roundRect(ox,10,80,38,12);ctx.fill();ctx.fillStyle='#fff';ctx.font='bold 14px sans-serif';ctx.textAlign='left';ctx.fillText(`⭐${Math.ceil(inv/60)}s`,ox+10,34);}
  // 进度
  const pr=Math.min(P.x/flagX,1);
  const bw=Math.min(canvas.width-40,300),bx=(canvas.width-bw)/2,by2=canvas.height-(isMobile?185:28);
  ctx.fillStyle='rgba(0,0,0,0.3)';ctx.beginPath();ctx.roundRect(bx,by2,bw,12,6);ctx.fill();
  ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.roundRect(bx,by2,bw*pr,12,6);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(`${Math.floor(pr*100)}%`,bx+bw/2,by2+10);
}

function drawMenu(){
  const sg=ctx.createLinearGradient(0,0,0,canvas.height);
  sg.addColorStop(0,'#87CEEB');sg.addColorStop(1,'#E8F5E9');
  ctx.fillStyle=sg;ctx.fillRect(0,0,canvas.width,canvas.height);

  const b=Math.sin(menuB)*10;
  ctx.fillStyle='#FF4081';ctx.font=`bold ${isMobile?30:46}px sans-serif`;ctx.textAlign='center';
  ctx.strokeStyle='#fff';ctx.lineWidth=4;
  ctx.strokeText('🥚 蛋仔派对 🎉',canvas.width/2,canvas.height*0.22+b);
  ctx.fillText('🥚 蛋仔派对 🎉',canvas.width/2,canvas.height*0.22+b);
  ctx.font=`bold ${isMobile?18:26}px sans-serif`;ctx.fillStyle='#1565C0';
  ctx.strokeText('朱宸旭大冒险',canvas.width/2,canvas.height*0.31+b);
  ctx.fillText('朱宸旭大冒险',canvas.width/2,canvas.height*0.31+b);

  drawEgg(canvas.width/2-70,canvas.height*0.38,44,52,false,'朱宸旭',true,1,1,0,0);
  drawEgg(canvas.width/2+26,canvas.height*0.38,44,52,true,'巩昱麟',false,1,1,0,0);
  ctx.fillStyle='#F44336';ctx.font='bold 16px sans-serif';ctx.textAlign='center';ctx.fillText('VS',canvas.width/2,canvas.height*0.42);

  // 按钮
  const bw2=220,bh=56,bx2=canvas.width/2-bw2/2,by=canvas.height*0.58;
  ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.roundRect(bx2,by,bw2,bh,16);ctx.fill();
  ctx.strokeStyle='#388E3C';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.fillText('开始游戏 🎮',canvas.width/2,by+37);

  ctx.fillStyle='#555';ctx.font='13px sans-serif';
  ctx.fillText('WASD / 方向键移动 · W / ↑ 跳跃',canvas.width/2,canvas.height*0.74);
  ctx.fillText('空格键射击 · 踩头或射击消灭敌人',canvas.width/2,canvas.height*0.79);
  ctx.fillText('收集金币和道具 · 到达终点旗帜通关',canvas.width/2,canvas.height*0.84);

  if(keys[' ']||keys['Enter'])startGame();
}

function drawWin(){
  const sg=ctx.createLinearGradient(0,0,0,canvas.height);
  sg.addColorStop(0,'#FFF9C4');sg.addColorStop(1,'#F0F4C3');
  ctx.fillStyle=sg;ctx.fillRect(0,0,canvas.width,canvas.height);
  const b=Math.sin(menuB)*8;
  ctx.fillStyle='#FF4081';ctx.font=`bold ${isMobile?34:46}px sans-serif`;ctx.textAlign='center';
  ctx.strokeStyle='#fff';ctx.lineWidth=4;
  ctx.strokeText('🎉 通关啦！🎉',canvas.width/2,canvas.height*0.28+b);
  ctx.fillText('🎉 通关啦！🎉',canvas.width/2,canvas.height*0.28+b);
  ctx.fillStyle='#333';ctx.font='bold 24px sans-serif';
  ctx.fillText(`最终得分: ${score}`,canvas.width/2,canvas.height*0.42);
  ctx.fillText(`剩余生命: ${'❤️'.repeat(lives)}`,canvas.width/2,canvas.height*0.49);
  drawEgg(canvas.width/2-22,canvas.height*0.54,44,52,false,'朱宸旭',true,1,1,0,0);
  const bw2=220,bh=56,bx2=canvas.width/2-bw2/2,by=canvas.height*0.7;
  ctx.fillStyle='#4CAF50';ctx.beginPath();ctx.roundRect(bx2,by,bw2,bh,16);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.fillText('再来一局 🔄',canvas.width/2,by+37);
  if(keys[' ']||keys['Enter'])startGame();
}

function drawGO(){
  ctx.fillStyle='rgba(0,0,0,0.75)';ctx.fillRect(0,0,canvas.width,canvas.height);
  const b=Math.sin(menuB)*5;
  ctx.fillStyle='#F44336';ctx.font=`bold ${isMobile?34:46}px sans-serif`;ctx.textAlign='center';
  ctx.strokeStyle='#fff';ctx.lineWidth=3;
  ctx.strokeText('💀 游戏结束 💀',canvas.width/2,canvas.height*0.3+b);
  ctx.fillText('💀 游戏结束 💀',canvas.width/2,canvas.height*0.3+b);
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.fillText(`得分: ${score}`,canvas.width/2,canvas.height*0.45);
  const bw2=220,bh=56,bx2=canvas.width/2-bw2/2,by=canvas.height*0.58;
  ctx.fillStyle='#FF5722';ctx.beginPath();ctx.roundRect(bx2,by,bw2,bh,16);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 24px sans-serif';ctx.fillText('重新开始 💪',canvas.width/2,by+37);
  if(keys[' ']||keys['Enter'])startGame();
}

// 点击
function handleClick(x,y){
  const bw2=220,bh=56,bx2=canvas.width/2-bw2/2;
  if(state==='menu'){const by=canvas.height*0.58;if(x>=bx2&&x<=bx2+bw2&&y>=by&&y<=by+bh)startGame();}
  else if(state==='win'){const by=canvas.height*0.7;if(x>=bx2&&x<=bx2+bw2&&y>=by&&y<=by+bh)startGame();}
  else if(state==='gameover'){const by=canvas.height*0.58;if(x>=bx2&&x<=bx2+bw2&&y>=by&&y<=by+bh)startGame();}
}
canvas.addEventListener('click',e=>{const r=canvas.getBoundingClientRect();handleClick(e.clientX-r.left,e.clientY-r.top);});
canvas.addEventListener('touchstart',e=>{const r=canvas.getBoundingClientRect();handleClick(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:true});

function gameLoop(){update();draw();requestAnimationFrame(gameLoop);}
gameLoop();
</script>
</body>
